<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cherrypicked | Coming Soon</title>
<meta name="description" content="A kid-friendly, local-only video player. No streaming, no surprises. Just the videos you chose. Coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ee;
    --cream-deep: #f7e9d8;
    --cherry: #e23a51;
    --cherry-deep: #b8283d;
    --leaf: #5fa85f;
    --leaf-deep: #3f7d3f;
    --ink: #3a2b2e;
    --soft: #8a6f72;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Nunito', sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #fbe2c8 0%, transparent 60%),
      radial-gradient(900px 500px at 10% 110%, #f9d9d0 0%, transparent 55%),
      var(--cream);
    color: var(--ink);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.25rem;
    overflow-x: hidden;
    position: relative;
  }

  /* floating cherries in the background */
  .floaties { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .floaties span {
    position: absolute;
    font-size: 2rem;
    opacity: 0.18;
    animation: drift 14s ease-in-out infinite;
  }
  .floaties span:nth-child(1){ left:8%;  top:18%; animation-delay:0s;   font-size:2.6rem; }
  .floaties span:nth-child(2){ left:84%; top:24%; animation-delay:-3s;  font-size:1.8rem; }
  .floaties span:nth-child(3){ left:18%; top:74%; animation-delay:-6s;  font-size:2.2rem; }
  .floaties span:nth-child(4){ left:74%; top:70%; animation-delay:-9s;  font-size:3rem;   }
  .floaties span:nth-child(5){ left:50%; top:12%; animation-delay:-4.5s;font-size:1.6rem; }

  @keyframes drift {
    0%,100% { transform: translateY(0) rotate(-6deg); }
    50%     { transform: translateY(-24px) rotate(6deg); }
  }

  .card {
    position: relative;
    z-index: 1;
    max-width: 600px;
    animation: rise 0.9s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 500;
    font-size: clamp(2.8rem, 9vw, 4.6rem);
    line-height: 1;
    color: var(--cherry-deep);
    letter-spacing: -0.5px;
    margin-top: 0.5rem;
  }
  h1 .pick { color: var(--cherry-deep); font-weight: 700; }

  .badge {
    display: inline-block;
    margin: 1.1rem 0 1.4rem;
    padding: 0.4rem 1rem;
    background: var(--leaf);
    color: #fff;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    border-radius: 999px;
    box-shadow: 0 6px 0 var(--leaf-deep);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.05); }
  }

  .tagline {
    font-size: clamp(1.1rem, 4vw, 1.4rem);
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 0.6rem;
  }
  .sub {
    font-size: clamp(0.98rem, 3.5vw, 1.1rem);
    color: var(--soft);
    line-height: 1.55;
    max-width: 440px;
    margin: 0 auto;
  }

  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    justify-content: center;
    margin-top: 1.8rem;
  }
  .pill {
    background: #fff;
    border: 2px solid var(--cream-deep);
    padding: 0.5rem 0.95rem;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--ink);
    box-shadow: 0 3px 0 var(--cream-deep);
  }
  .pill b { color: var(--cherry-deep); }

  footer {
    position: relative;
    z-index: 1;
    margin-top: 2.6rem;
    color: var(--soft);
    font-size: 0.85rem;
  }

  @media (prefers-reduced-motion: reduce) {
    .floaties span, .badge, .card { animation: none; }
  }
</style>
</head>
<body>

  <div class="floaties" aria-hidden="true">
    <span>🍒</span><span>🍒</span><span>🍒</span><span>🍒</span><span>🍒</span>
  </div>

  <main class="card">
    <h1>cherry<span class="pick">picked</span></h1>

    <span class="badge">Coming soon!</span>

    <p class="tagline">The video player made just for kids.</p>
    <p class="sub">
      Only the videos you picked, playing right from your own device.
      No streaming, no rabbit holes, no surprises. Just safe, simple watching.
    </p>

    <div class="features">
      <span class="pill">🎬 <b>Local files only</b></span>
      <span class="pill">🛡️ <b>Kid-safe</b></span>
      <span class="pill">📵 <b>No streaming</b></span>
    </div>
  </main>

  <footer>
    © <span id="year"></span> · cherrypicked.video
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
