<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cherrypicked</title>
<meta name="description" content="A simple, safe video player for kids, made by a parent. Plays only the videos you picked, right from your own device. No streaming, no tracking, no algorithm.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ee;
    --cream-deep: #f7e9d8;
    --cherry: #e23a51;
    --cherry-deep: #b8283d;
    --leaf: #5fa85f;
    --leaf-deep: #3f7d3f;
    --ink: #3a2b2e;
    --soft: #8a6f72;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #fffdfb;
    color: var(--ink);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.25rem;
    overflow-x: hidden;
    position: relative;
  }

  /* floating cherries in the background */
  .floaties { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .floaties .cherry {
    position: absolute;
    width: 3.4rem;
    color: var(--cherry);
    opacity: 0.14;
    overflow: visible;
    animation: drift 14s ease-in-out infinite;
  }
  .floaties .cherry:nth-child(1){ left:6%;  top:14%; animation-delay:0s;   width:4.2rem; }
  .floaties .cherry:nth-child(2){ left:86%; top:20%; animation-delay:-3s;  width:3.1rem; }
  .floaties .cherry:nth-child(3){ left:10%; top:78%; animation-delay:-6s;  width:3.8rem; }
  .floaties .cherry:nth-child(4){ left:82%; top:74%; animation-delay:-9s;  width:4.8rem; }
  .floaties .cherry:nth-child(5){ left:90%; top:48%; animation-delay:-4.5s;width:2.7rem; }

  @keyframes drift {
    0%,100% { transform: translateY(0) rotate(-6deg); }
    50%     { transform: translateY(-24px) rotate(6deg); }
  }

  .card {
    position: relative;
    z-index: 1;
    max-width: 600px;
    animation: rise 0.9s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    width: clamp(92px, 22vw, 128px);
    height: auto;
    display: block;
    margin: 0 auto;
    filter: drop-shadow(0 8px 18px rgba(58, 43, 46, 0.16));
  }

  h1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 500;
    font-size: clamp(2.8rem, 9vw, 4.6rem);
    line-height: 1;
    color: #1a1416;
    letter-spacing: -0.5px;
    margin-top: 0.5rem;
  }
  h1 .pick { color: #1a1416; font-weight: 700; }

  .badge {
    display: inline-block;
    margin: 1.8rem 0 2.6rem;
    padding: 0.45rem 1rem;
    background: var(--leaf);
    color: #fff;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    border-radius: 999px;
    box-shadow: 0 2px 6px rgba(63, 125, 63, 0.18);
  }

  .tagline {
    font-size: clamp(1.1rem, 4vw, 1.4rem);
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 0.35rem;
  }
  .by {
    font-family: 'Fredoka', sans-serif;
    font-weight: 500;
    font-size: clamp(0.95rem, 3.2vw, 1.05rem);
    color: var(--cherry-deep);
    margin-bottom: 0.7rem;
  }
  .sub {
    font-size: clamp(0.98rem, 3.5vw, 1.1rem);
    color: var(--soft);
    line-height: 1.55;
    max-width: 440px;
    margin: 0 auto;
  }

  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    justify-content: center;
    margin-top: 1.8rem;
  }
  .pill {
    background: #fff;
    border: 1.5px solid #efe7e3;
    padding: 0.5rem 0.95rem;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--ink);
    box-shadow: 0 2px 6px rgba(58, 43, 46, 0.06);
  }
  .pill b { color: var(--cherry-deep); }

  footer {
    position: relative;
    z-index: 1;
    margin-top: 2.6rem;
    color: var(--soft);
    font-size: 0.85rem;
  }

  @media (prefers-reduced-motion: reduce) {
    .floaties .cherry, .badge, .card, .logo { animation: none; }
  }
</style>
</head>
